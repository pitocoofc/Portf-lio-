<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil | NDJ-Lib</title>

<style>

:root{
--bg:#0a0a0c;
--card:#161b22;
--text:#e6edf3;
--purple:#6f2da8;
--blue:#005a82;
}

body{
background:var(--bg);
color:var(--text);
font-family:Inter,sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:40px auto;
background:var(--card);
padding:40px;
border-radius:20px;
border:1px solid #30363d;
}

h1{
text-align:center;
margin-bottom:40px;
}

.profile{
display:flex;
gap:25px;
align-items:center;
flex-wrap:wrap;
}

.avatar-wrapper{
position:relative;
}

.avatar{
width:130px;
height:130px;
border-radius:50%;
border:3px solid var(--purple);
box-shadow:0 0 20px rgba(111,45,168,0.6);
}

.status-dot{
position:absolute;
bottom:5px;
right:5px;
width:22px;
height:22px;
border-radius:50%;
border:3px solid var(--card);
}

.online{background:#3ba55d;}
.idle{background:#faa61a;}
.dnd{background:#ed4245;}
.offline{background:#747f8d;}

.info{
flex:1;
}

.name{
font-size:1.6rem;
font-weight:900;
margin-top:10px;
}

.bubble{
background:#0d1117;
padding:18px;
border-radius:15px;
border-left:4px solid var(--purple);
margin-bottom:15px;
position:relative;
}

.bubble::after{
content:"";
position:absolute;
left:-12px;
top:20px;
border-width:10px;
border-style:solid;
border-color:transparent #0d1117 transparent transparent;
}

.spotify-card{
margin-top:20px;
background:#0d1117;
border-radius:15px;
padding:15px;
border:1px solid #30363d;
max-width:300px;
}

.spotify-card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.song{
font-weight:bold;
}

.artist{
font-size:0.9rem;
opacity:0.8;
margin-bottom:8px;
}

.progress{
height:6px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:var(--purple);
width:0%;
}

.btn-back{
display:inline-block;
margin-top:40px;
color:var(--blue);
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>NDJ-Lib Developer</h1>

<div class="profile">

<div class="avatar-wrapper">

<img id="avatar" class="avatar">

<div id="status" class="status-dot"></div>

</div>

<div class="info">

<div id="bio" class="bubble">
Carregando status...
</div>

<div id="name" class="name"></div>

</div>

</div>

<div id="spotifyCard" class="spotify-card" style="display:none;">

<img id="album">

<div class="song" id="song"></div>
<div class="artist" id="artist"></div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

<div style="text-align:center;">
<a href="index.html" class="btn-back">← Voltar</a>
</div>

</div>

<script>

const USER_ID="1448096319372656703";

let start=0;
let end=0;

async function atualizar(){

const r=await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
const j=await r.json();

if(!j.success) return;

const d=j.data;
const user=d.discord_user;

/* avatar */

document.getElementById("avatar").src=
`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=512`;

/* nome */

document.getElementById("name").innerText=
user.display_name || user.username;

/* status */

const dot=document.getElementById("status");

dot.classList.remove("online","idle","dnd","offline");

if(d.discord_status){
dot.classList.add(d.discord_status);
}

/* custom status */

let bio="Sem status";

if(d.activities){

for(const act of d.activities){

if(act.name==="Custom Status" && act.state){

bio=act.state;

}

}

}

document.getElementById("bio").innerText=bio;

/* spotify */

if(d.spotify){

const s=d.spotify;

document.getElementById("spotifyCard").style.display="block";

document.getElementById("album").src=s.album_art_url;
document.getElementById("song").innerText=s.song;
document.getElementById("artist").innerText=s.artist;

start=s.timestamps.start;
end=s.timestamps.end;

}else{

document.getElementById("spotifyCard").style.display="none";

}

}

/* barra da música */

function atualizarBarra(){

if(start && end){

const now=Date.now();

const total=end-start;
const atual=now-start;

let pct=(atual/total)*100;

if(pct>100) pct=100;

document.getElementById("progressBar").style.width=pct+"%";

}

}

atualizar();

setInterval(atualizar,5000);
setInterval(atualizarBarra,1000);

</script>

</body>
</html>
