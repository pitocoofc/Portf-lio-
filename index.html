<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | NDJ-Lib</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #161b22;
            --text: #e6edf3;
            --purple: #6f2da8;
            --blue: #005a82;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--purple);
            box-shadow: 0 0 20px rgba(111,45,168,0.4);
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 4px solid var(--card);
        }

        .online { background: #3ba55d; }
        .idle { background: #faa61a; }
        .dnd { background: #ed4245; }
        .offline { background: #747f8d; }

        .name {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 10px 0;
        }

        .bubble {
            background: #0d1117;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--purple);
            font-size: 0.9rem;
            line-height: 1.4;
            width: 100%;
            box-sizing: border-box;
        }

        /* Spotify Card Estilizado */
        .spotify-card {
            margin-top: 25px;
            background: #0d1117;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #1db95433;
            display: none;
        }

        .spotify-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .spotify-info img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
        }

        .song-details {
            flex: 1;
            overflow: hidden;
        }

        .song {
            font-weight: bold;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            font-size: 0.85rem;
            color: #8b949e;
        }

        .progress-container {
            margin-top: 12px;
        }

        .progress {
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #1db954;
            width: 0%;
            transition: width 0.5s linear;
        }

        .btn-back {
            display: block;
            margin-top: 30px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NDJ-Lib Developer</h1>

    <div class="profile">
        <div class="avatar-wrapper">
            <img id="avatar" class="avatar" src="">
            <div id="status" class="status-dot"></div>
        </div>

        <div id="name" class="name">Carregando...</div>
        
        <div id="bio" class="bubble">
            Puxando status do Discord...
        </div>
    </div>

    <div id="spotifyCard" class="spotify-card">
        <div class="spotify-info">
            <img id="album" src="">
            <div class="song-details">
                <div class="song" id="song">Música</div>
                <div class="artist" id="artist">Artista</div>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div style="text-align:center;">
        <a href="index.html" class="btn-back">← Voltar ao início</a>
    </div>
</div>

<script>
    const USER_ID = "1448096319372656703";
    let songStart = 0;
    let songEnd = 0;

    async function atualizar() {
        try {
            const r = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
            const data = await r.json();

            if (!data.success) return;
            const d = data.data;

            // 1. Dados Básicos
            const user = d.discord_user;
            const ext = user.avatar.startsWith("a_") ? "gif" : "png";
            document.getElementById("avatar").src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=512`;
            document.getElementById("name").innerText = user.display_name || user.username;

            // 2. Status (Bolinha)
            const dot = document.getElementById("status");
            dot.className = "status-dot " + (d.discord_status || "offline");

            // 3. Status Personalizado (Bio)
            const customAct = d.activities.find(act => act.type === 4);
            document.getElementById("bio").innerText = customAct ? customAct.state : "Sem status no momento";

            // 4. Spotify
            const spotifyCard = document.getElementById("spotifyCard");
            if (d.listening_to_spotify && d.spotify) {
                spotifyCard.style.display = "block";
                document.getElementById("album").src = d.spotify.album_art_url;
                document.getElementById("song").innerText = d.spotify.song;
                document.getElementById("artist").innerText = d.spotify.artist;
                
                songStart = d.spotify.timestamps.start;
                songEnd = d.spotify.timestamps.end;
            } else {
                spotifyCard.style.display = "none";
                songStart = 0;
                songEnd = 0;
            }

        } catch (e) {
            console.error("Erro ao atualizar:", e);
        }
    }

    function atualizarBarra() {
        if (songStart && songEnd) {
            const now = Date.now();
            const total = songEnd - songStart;
            const atual = now - songStart;
            let pct = (atual / total) * 100;
            
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            
            document.getElementById("progressBar").style.width = pct + "%";
        }
    }

    // Inicialização
    atualizar();
    setInterval(atualizar, 5000);
    setInterval(atualizarBarra, 1000);
</script>

</body>
</html>
