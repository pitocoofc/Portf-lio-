<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | NDJ-Lib</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #161b22;
            --text: #e6edf3;
            --purple: #6f2da8;
            --green: #1db954;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Layout Profile com Balão */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid var(--purple);
            box-shadow: 0 0 15px rgba(111, 45, 168, 0.4);
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid var(--card);
            background: #747f8d;
        }

        /* Balão de Fala Anime */
        .bubble {
            background: #fff;
            color: #000;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            position: relative;
            flex: 1;
            box-shadow: 4px 4px 0px var(--purple);
            min-height: 20px;
            display: flex;
            align-items: center;
        }

        .bubble::before {
            content: "";
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-right: 12px solid #fff;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 10px 0;
            word-break: break-all;
        }

        /* Spotify Estilizado */
        .spotify-card {
            margin-top: 20px;
            background: #0d1117;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #1db95433;
            display: none;
        }

        .spotify-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .spotify-info img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--green);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-details { flex: 1; overflow: hidden; }
        .song { font-weight: bold; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .artist { font-size: 0.8rem; color: #8b949e; }

        .progress {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--green);
            width: 0%;
            transition: width 1s linear;
        }

        /* Cores de Status */
        .online { background: #3ba55d; }
        .idle { background: #faa61a; }
        .dnd { background: #ed4245; }
        .offline { background: #747f8d; }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="avatar" class="avatar" src="">
            <div id="status" class="status-dot"></div>
        </div>
        <div id="bio" class="bubble">...</div>
    </div>

    <div id="name" class="name">Carregando...</div>

    <div id="spotifyCard" class="spotify-card">
        <div class="spotify-info">
            <img id="album" src="">
            <div class="song-details">
                <div class="song" id="song">Música</div>
                <div class="artist" id="artist">Artista</div>
            </div>
        </div>
        <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
    </div>

    <a href="index.html" class="btn-back">← Voltar</a>
</div>

<script>
    const USER_ID = "1448096319372656703";
    let sStart = 0, sEnd = 0;

    // Sistema WebSocket da Lanyard
    const socket = new WebSocket("wss://api.lanyard.rest/socket");

    socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        // Op 1: Hello (Primeiro contato)
        if (msg.op === 1) {
            socket.send(JSON.stringify({
                op: 2,
                d: { subscribe_to_id: USER_ID }
            }));
            // Heartbeat para manter conexão viva
            setInterval(() => socket.send(JSON.stringify({ op: 3 })), msg.d.heartbeat_interval);
        }

        // INIT ou UPDATE de Presença
        if (msg.t === "INIT_STATE" || msg.t === "PRESENCE_UPDATE") {
            const d = msg.t === "INIT_STATE" ? msg.d : msg.d;
            updateUI(msg.t === "INIT_STATE" ? d[USER_ID] : d);
        }
    };

    function updateUI(d) {
        if (!d) return;

        // Avatar e Nome
        const user = d.discord_user;
        const ext = user.avatar.startsWith("a_") ? "gif" : "png";
        document.getElementById("avatar").src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=256`;
        document.getElementById("name").innerText = user.display_name || user.username;

        // Status e Bio
        document.getElementById("status").className = "status-dot " + (d.discord_status || "offline");
        const custom = d.activities.find(a => a.type === 4);
        document.getElementById("bio").innerText = custom ? custom.state : "Zzz...";

        // Spotify
        const card = document.getElementById("spotifyCard");
        if (d.listening_to_spotify && d.spotify) {
            card.style.display = "block";
            document.getElementById("album").src = d.spotify.album_art_url;
            document.getElementById("song").innerText = d.spotify.song;
            document.getElementById("artist").innerText = d.spotify.artist;
            sStart = d.spotify.timestamps.start;
            sEnd = d.spotify.timestamps.end;
        } else {
            card.style.display = "none";
            sStart = 0; sEnd = 0;
        }
    }

    // Atualização da barra de progresso
    setInterval(() => {
        if (sStart && sEnd) {
            const now = Date.now();
            let pct = ((now - sStart) / (sEnd - sStart)) * 100;
            document.getElementById("progressBar").style.width = Math.min(100, Math.max(0, pct)) + "%";
        }
    }, 1000);
</script>

</body>
</html>
